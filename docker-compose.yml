# docker-compose.yml — local development with Docker
#
# Prerequisites:
#   cp .env.example .env   # fill in all values
#
# Usage:
#   docker compose up --build          # first run (or after code changes)
#   docker compose up                  # subsequent runs
#   docker compose down -v             # stop and remove volumes

services:

  # ── FastAPI ──────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
    env_file: .env
    environment:
      # Absolute path inside the shared db volume (overrides .env value)
      DATABASE_URL: sqlite+aiosqlite:////data/speakhome.db
    volumes:
      - db_data:/data
    ports:
      - "8000:8000"
    # Run Alembic migrations before starting the server
    command: >
      sh -c "alembic upgrade head &&
             uvicorn api.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  # ── LiveKit Agent Worker ──────────────────────────────────────────────────────
  agent:
    build:
      context: ./backend
    env_file: .env
    environment:
      DATABASE_URL: sqlite+aiosqlite:////data/speakhome.db
    volumes:
      - db_data:/data
      # Persist cached ML model downloads across container restarts
      - agent_cache:/root/.cache
    command: python -m agent.worker start
    depends_on:
      api:
        condition: service_healthy
    restart: on-failure

  # ── Next.js Frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_* are baked into the JS bundle at build time.
        # The browser calls the API at this URL — must be reachable from the host.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        # Falls back to LIVEKIT_URL when NEXT_PUBLIC_LIVEKIT_URL is not set.
        NEXT_PUBLIC_LIVEKIT_URL: ${NEXT_PUBLIC_LIVEKIT_URL:-${LIVEKIT_URL}}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  # SQLite database file shared between the API and agent worker
  db_data:
  # Silero VAD model cache (avoids re-downloading on restart)
  agent_cache:
